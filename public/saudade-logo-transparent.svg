<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Saudade – High Frequency Living · High Frequency Fashion">
  <title>Saudade</title>
  <defs>
    <!-- Top arc path for "High Frequncy Living" -->
    <path id="topArcT" d="M 22,120 A 98,98 0 0,1 218,120"/>
    <!-- Bottom arc path for "High Frequency Fashion" -->
    <path id="bottomArcT" d="M 28,128 A 95,95 0 0,0 212,128"/>

    <!-- Clip to keep mandala inside the disc -->
    <clipPath id="discClipT">
      <circle cx="120" cy="120" r="78"/>
    </clipPath>
  </defs>

  <!-- ── Outer ring (thin stroke, no fill) ── -->
  <circle cx="120" cy="120" r="108" fill="none" stroke="rgba(210,187,178,0.55)" stroke-width="1.2"/>

  <!-- ── Curved text – top ── -->
  <text font-family="'Cormorant Garamond', Georgia, serif" font-size="11.5" font-weight="400" letter-spacing="1.8" fill="rgba(210,187,178,0.75)">
    <textPath href="#topArcT" startOffset="50%" text-anchor="middle">High Frequncy Living</textPath>
  </text>

  <!-- ── Curved text – bottom ── -->
  <text font-family="'Cormorant Garamond', Georgia, serif" font-size="11.5" font-weight="400" letter-spacing="1.8" fill="rgba(210,187,178,0.75)">
    <textPath href="#bottomArcT" startOffset="50%" text-anchor="middle">High Frequency Fashion</textPath>
  </text>

  <!-- ── NO disc fill — transparent background ── -->

  <!-- ── 8-pointed star ── -->
  <polygon points="120,42 147,98 120,198 93,98"
           fill="none" stroke="rgba(210,187,178,0.35)" stroke-width="1.4" opacity="0.75"/>
  <polygon points="120,42 147,98 120,198 93,98"
           fill="none" stroke="rgba(210,187,178,0.35)" stroke-width="1.4" opacity="0.75"
           transform="rotate(45,120,120)"/>
  <polygon points="120,42 147,98 120,198 93,98"
           fill="none" stroke="rgba(210,187,178,0.35)" stroke-width="1.4" opacity="0.75"
           transform="rotate(22.5,120,120)"/>
  <polygon points="120,42 147,98 120,198 93,98"
           fill="none" stroke="rgba(210,187,178,0.35)" stroke-width="1.4" opacity="0.75"
           transform="rotate(67.5,120,120)"/>

  <!-- ── MANDALA — clipped inside disc ── -->
  <g clip-path="url(#discClipT)">

    <!-- Ring 3 — Outermost petals -->
    <g fill="none" stroke="rgba(210,187,178,0.45)" stroke-width="1.1">
      <ellipse cx="120" cy="75" rx="8" ry="22" transform="rotate(0,120,120)"/>
      <ellipse cx="120" cy="75" rx="8" ry="22" transform="rotate(30,120,120)"/>
      <ellipse cx="120" cy="75" rx="8" ry="22" transform="rotate(60,120,120)"/>
      <ellipse cx="120" cy="75" rx="8" ry="22" transform="rotate(90,120,120)"/>
      <ellipse cx="120" cy="75" rx="8" ry="22" transform="rotate(120,120,120)"/>
      <ellipse cx="120" cy="75" rx="8" ry="22" transform="rotate(150,120,120)"/>
      <ellipse cx="120" cy="75" rx="8" ry="22" transform="rotate(180,120,120)"/>
      <ellipse cx="120" cy="75" rx="8" ry="22" transform="rotate(210,120,120)"/>
      <ellipse cx="120" cy="75" rx="8" ry="22" transform="rotate(240,120,120)"/>
      <ellipse cx="120" cy="75" rx="8" ry="22" transform="rotate(270,120,120)"/>
      <ellipse cx="120" cy="75" rx="8" ry="22" transform="rotate(300,120,120)"/>
      <ellipse cx="120" cy="75" rx="8" ry="22" transform="rotate(330,120,120)"/>
    </g>

    <!-- Ring 2 — Mid petals -->
    <g fill="none" stroke="rgba(210,187,178,0.55)" stroke-width="1.1">
      <ellipse cx="120" cy="83" rx="6" ry="17" transform="rotate(15,120,120)"/>
      <ellipse cx="120" cy="83" rx="6" ry="17" transform="rotate(45,120,120)"/>
      <ellipse cx="120" cy="83" rx="6" ry="17" transform="rotate(75,120,120)"/>
      <ellipse cx="120" cy="83" rx="6" ry="17" transform="rotate(105,120,120)"/>
      <ellipse cx="120" cy="83" rx="6" ry="17" transform="rotate(135,120,120)"/>
      <ellipse cx="120" cy="83" rx="6" ry="17" transform="rotate(165,120,120)"/>
      <ellipse cx="120" cy="83" rx="6" ry="17" transform="rotate(195,120,120)"/>
      <ellipse cx="120" cy="83" rx="6" ry="17" transform="rotate(225,120,120)"/>
      <ellipse cx="120" cy="83" rx="6" ry="17" transform="rotate(255,120,120)"/>
      <ellipse cx="120" cy="83" rx="6" ry="17" transform="rotate(285,120,120)"/>
      <ellipse cx="120" cy="83" rx="6" ry="17" transform="rotate(315,120,120)"/>
      <ellipse cx="120" cy="83" rx="6" ry="17" transform="rotate(345,120,120)"/>
    </g>

    <!-- Ring 1 — Inner petals -->
    <g fill="none" stroke="rgba(210,187,178,0.65)" stroke-width="1.0">
      <ellipse cx="120" cy="95" rx="4.5" ry="11" transform="rotate(0,120,120)"/>
      <ellipse cx="120" cy="95" rx="4.5" ry="11" transform="rotate(30,120,120)"/>
      <ellipse cx="120" cy="95" rx="4.5" ry="11" transform="rotate(60,120,120)"/>
      <ellipse cx="120" cy="95" rx="4.5" ry="11" transform="rotate(90,120,120)"/>
      <ellipse cx="120" cy="95" rx="4.5" ry="11" transform="rotate(120,120,120)"/>
      <ellipse cx="120" cy="95" rx="4.5" ry="11" transform="rotate(150,120,120)"/>
      <ellipse cx="120" cy="95" rx="4.5" ry="11" transform="rotate(180,120,120)"/>
      <ellipse cx="120" cy="95" rx="4.5" ry="11" transform="rotate(210,120,120)"/>
      <ellipse cx="120" cy="95" rx="4.5" ry="11" transform="rotate(240,120,120)"/>
      <ellipse cx="120" cy="95" rx="4.5" ry="11" transform="rotate(270,120,120)"/>
      <ellipse cx="120" cy="95" rx="4.5" ry="11" transform="rotate(300,120,120)"/>
      <ellipse cx="120" cy="95" rx="4.5" ry="11" transform="rotate(330,120,120)"/>
    </g>

    <!-- Centre rosette -->
    <g fill="none" stroke="rgba(210,187,178,0.75)" stroke-width="1.0">
      <ellipse cx="120" cy="107" rx="3" ry="6" transform="rotate(0,120,120)"/>
      <ellipse cx="120" cy="107" rx="3" ry="6" transform="rotate(60,120,120)"/>
      <ellipse cx="120" cy="107" rx="3" ry="6" transform="rotate(120,120,120)"/>
      <ellipse cx="120" cy="107" rx="3" ry="6" transform="rotate(180,120,120)"/>
      <ellipse cx="120" cy="107" rx="3" ry="6" transform="rotate(240,120,120)"/>
      <ellipse cx="120" cy="107" rx="3" ry="6" transform="rotate(300,120,120)"/>
    </g>
    <circle cx="120" cy="120" r="4.5" fill="none" stroke="rgba(210,187,178,0.85)" stroke-width="1.0"/>
    <circle cx="120" cy="120" r="1.8" fill="rgba(210,187,178,0.85)"/>

    <!-- Outer disc edge rings -->
    <circle cx="120" cy="120" r="78" fill="none" stroke="rgba(210,187,178,0.25)" stroke-width="1.2"/>
    <circle cx="120" cy="120" r="73" fill="none" stroke="rgba(210,187,178,0.15)" stroke-width="0.8"/>

    <!-- Cardinal dots -->
    <circle cx="120" cy="42" r="2.5" fill="rgba(210,187,178,0.55)"/>
    <circle cx="198" cy="120" r="2.5" fill="rgba(210,187,178,0.55)"/>
    <circle cx="120" cy="198" r="2.5" fill="rgba(210,187,178,0.55)"/>
    <circle cx="42"  cy="120" r="2.5" fill="rgba(210,187,178,0.55)"/>

  </g>

  <!-- Disc border -->
  <circle cx="120" cy="120" r="84" fill="none" stroke="rgba(210,187,178,0.4)" stroke-width="1.5"/>

  <!-- ── SAUDADE wordmark ── -->
  <text x="122" y="128"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="30" font-weight="700" letter-spacing="3"
        text-anchor="middle" fill="rgba(0,0,0,0.3)">SAUDADE</text>
  <text x="120" y="126"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="30" font-weight="700" letter-spacing="3"
        text-anchor="middle" fill="rgba(210,187,178,0.95)">SAUDADE</text>

</svg>
